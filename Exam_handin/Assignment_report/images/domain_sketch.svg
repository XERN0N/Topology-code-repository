<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 195" font-family="serif">
  <defs>
    <!-- Open arrowhead, tip aligned with line end -->
    <marker id="ah" markerWidth="9" markerHeight="9" refX="9" refY="4.5"
            orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4.5 L0,9" fill="none" stroke="black" stroke-width="1.4"/>
    </marker>
  </defs>

  <!-- ── Domain rectangle: left=65 top=80 right=265 bottom=160 ── -->
  <rect x="65" y="80" width="200" height="80"
        fill="none" stroke="black" stroke-width="1.3"/>

  <!-- ── Clamped left edge: thick bar + diagonal hatch marks ── -->
  <line x1="65" y1="80" x2="65" y2="160" stroke="black" stroke-width="3"/>
  <line x1="65" y1="80"  x2="46" y2="99"  stroke="black" stroke-width="0.8"/>
  <line x1="65" y1="93"  x2="46" y2="112" stroke="black" stroke-width="0.8"/>
  <line x1="65" y1="107" x2="46" y2="126" stroke="black" stroke-width="0.8"/>
  <line x1="65" y1="120" x2="46" y2="139" stroke="black" stroke-width="0.8"/>
  <line x1="65" y1="133" x2="46" y2="152" stroke="black" stroke-width="0.8"/>
  <line x1="65" y1="147" x2="46" y2="166" stroke="black" stroke-width="0.8"/>
  <line x1="65" y1="160" x2="56" y2="169" stroke="black" stroke-width="0.8"/>

  <!-- ── F1: 70° upper-left, applied at x=105 (20% of L), y=80 (top edge) ──
       cos(70°)=0.342  sin(70°)=0.940
       Line tip at (105-0.342×50, 80-0.940×50) = (88, 33)               -->
  <line x1="105" y1="80" x2="88" y2="33"
        stroke="black" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- Angle arc: centre (105,80), r=20
       Start (180°): (85,80)
       End  (110°): (105+20·cos110°, 80−20·sin110°) = (98,61)
       sweep-flag=0 → CCW in SVG = short 70° arc going upward            -->
  <path d="M 85,80 A 20,20 0 0,0 98,61"
        fill="none" stroke="black" stroke-width="0.8"/>
  <!-- Labels -->
  <text x="79" y="67" font-size="8.5" text-anchor="middle">70°</text>
  <text x="80" y="25" font-size="11" font-weight="bold" text-anchor="middle">
    <tspan font-style="italic">F</tspan><tspan font-size="8" dy="3">1</tspan>
  </text>

  <!-- ── F2: 60° upper-left, applied at x=265 (tip, 100% of L), y=80 ──
       cos(60°)=0.500  sin(60°)=0.866
       Line tip at (265-0.500×50, 80-0.866×50) = (240, 37)              -->
  <line x1="265" y1="80" x2="240" y2="37"
        stroke="black" stroke-width="1.8" marker-end="url(#ah)"/>
  <!-- Angle arc: centre (265,80), r=20
       Start (180°): (245,80)
       End  (120°): (265+20·cos120°, 80−20·sin120°) = (255,63)          -->
  <path d="M 245,80 A 20,20 0 0,0 255,63"
        fill="none" stroke="black" stroke-width="0.8"/>
  <!-- Labels -->
  <text x="238" y="68" font-size="8.5" text-anchor="middle">60°</text>
  <text x="232" y="29" font-size="11" font-weight="bold" text-anchor="middle">
    <tspan font-style="italic">F</tspan><tspan font-size="8" dy="3">2</tspan>
  </text>

  <!-- ── "Fixed" label ── -->
  <text x="42" y="173" font-size="8" fill="#666" text-anchor="middle">Fixed</text>

  <!-- ── L dimension ── -->
  <line x1="65" y1="170" x2="265" y2="170"
        stroke="#999" stroke-width="0.6" stroke-dasharray="3,2"/>
  <line x1="65"  y1="166" x2="65"  y2="174" stroke="#999" stroke-width="0.9"/>
  <line x1="265" y1="166" x2="265" y2="174" stroke="#999" stroke-width="0.9"/>
  <text x="165" y="183" font-size="8.5" text-anchor="middle"
        font-style="italic">L = 1 m</text>

  <!-- ── W dimension ── -->
  <line x1="53" y1="80" x2="53" y2="160"
        stroke="#999" stroke-width="0.6" stroke-dasharray="3,2"/>
  <line x1="49" y1="80"  x2="57" y2="80"  stroke="#999" stroke-width="0.9"/>
  <line x1="49" y1="160" x2="57" y2="160" stroke="#999" stroke-width="0.9"/>
  <text x="53" y="120" font-size="8.5" text-anchor="middle"
        font-style="italic" transform="rotate(-90 53 120)">W = 0.5 m</text>
</svg>
